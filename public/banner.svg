<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a0d12"/>
      <stop offset="50%" stop-color="#11161f"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </linearGradient>

    <radialGradient id="glow-a" cx="0.85" cy="0.4" r="0.45">
      <stop offset="0%"  stop-color="#c69a55" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#c69a55" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c69a55" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-b" cx="0.1" cy="0.95" r="0.4">
      <stop offset="0%"  stop-color="#5b8aa8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5b8aa8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="planet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#f5e8c3"/>
      <stop offset="55%" stop-color="#c69a55"/>
      <stop offset="100%" stop-color="#3a2812"/>
    </radialGradient>

    <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c69a55" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#e8d6a3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c69a55" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c69a55" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#c69a55" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c69a55" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f5e8c3"/>
      <stop offset="100%" stop-color="#c69a55"/>
    </linearGradient>
  </defs>

  <!-- ============================== -->
  <!--  Background layers             -->
  <!-- ============================== -->
  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#glow-a)"/>
  <rect width="1280" height="400" fill="url(#glow-b)"/>

  <!-- subtle scan grid -->
  <g stroke="#e8d6a3" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="100"  x2="1280" y2="100"/>
    <line x1="0" y1="200"  x2="1280" y2="200"/>
    <line x1="0" y1="300"  x2="1280" y2="300"/>
    <line x1="320"  y1="0" x2="320"  y2="400"/>
    <line x1="640"  y1="0" x2="640"  y2="400"/>
    <line x1="960"  y1="0" x2="960"  y2="400"/>
  </g>

  <!-- ============================== -->
  <!--  Right: orbital composition    -->
  <!-- ============================== -->
  <g transform="translate(1060 200)">
    <!-- outer dust ring -->
    <circle r="170" fill="none" stroke="#c69a55" stroke-width="0.4" opacity="0.18" stroke-dasharray="1 6"/>
    <!-- middle ring (rotating dashed) -->
    <circle r="130" fill="none" stroke="#c69a55" stroke-width="0.7" opacity="0.4"  stroke-dasharray="3 5"/>
    <!-- inner ring -->
    <circle r="92"  fill="none" stroke="#c69a55" stroke-width="0.9" opacity="0.55"/>
    <!-- inclined orbit ellipse -->
    <ellipse rx="160" ry="50" fill="none" stroke="url(#ring-grad)" stroke-width="1.2" opacity="0.7" transform="rotate(20)"/>
    <ellipse rx="180" ry="60" fill="none" stroke="#c69a55" stroke-width="0.5" opacity="0.25" transform="rotate(-15)"/>
    <!-- planet core -->
    <circle r="58" fill="url(#planet)"/>
    <!-- planet terminator -->
    <circle r="58" fill="none" stroke="#0a0d12" stroke-width="1" opacity="0.6"/>
    <!-- planet glow ring -->
    <circle r="68" fill="none" stroke="#e8d6a3" stroke-width="0.5" opacity="0.3"/>
    <!-- orbiting moons -->
    <circle cx="0"   cy="-130" r="4" fill="#e8d6a3"/>
    <circle cx="160" cy="0"    r="3" fill="#c69a55"/>
    <circle cx="-92" cy="0"    r="2.5" fill="#e8d6a3" opacity="0.8"/>
    <!-- corner ticks (HUD-style) -->
    <g stroke="#c69a55" stroke-width="1" opacity="0.6">
      <line x1="-200" y1="-150" x2="-180" y2="-150"/>
      <line x1="-200" y1="-150" x2="-200" y2="-130"/>
      <line x1="200"  y1="150"  x2="180"  y2="150"/>
      <line x1="200"  y1="150"  x2="200"  y2="130"/>
    </g>
  </g>

  <!-- ============================== -->
  <!--  Left: typography              -->
  <!-- ============================== -->
  <g transform="translate(70 0)">
    <!-- eyebrow line + label -->
    <line x1="0" y1="56" x2="40" y2="56" stroke="url(#line-grad)" stroke-width="1.2"/>
    <text x="52" y="60" font-family="JetBrains Mono, Menlo, monospace" font-size="11"
          letter-spacing="6" fill="#c69a55">CHINA JILIANG UNIVERSITY · HANGZHOU</text>

    <!-- main name -->
    <text x="0" y="180" font-family="Georgia, 'Times New Roman', serif" font-size="96"
          font-weight="300" letter-spacing="-3" fill="url(#text-grad)">Hugo Lee</text>

    <!-- gradient divider -->
    <line x1="0" y1="210" x2="240" y2="210" stroke="url(#line-grad)" stroke-width="1.4"/>
    <line x1="240" y1="210" x2="290" y2="210" stroke="#c69a55" stroke-width="1.4" opacity="0.4"/>

    <!-- tagline -->
    <text x="0" y="248" font-family="Georgia, serif" font-size="20" font-style="italic"
          font-weight="300" fill="#e8d6a3" opacity="0.85">building cinematic web experiences with code</text>

    <!-- meta line -->
    <g transform="translate(0 290)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="11"
            letter-spacing="3" fill="#e8d6a3" opacity="0.6">AI · WEBGL · THREE.JS · CREATIVE CODING</text>
    </g>

    <!-- arrow prompt -->
    <g transform="translate(0 340)">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#c69a55" stroke-width="1" opacity="0.7"/>
      <text x="50" y="4" font-family="JetBrains Mono, monospace" font-size="10"
            letter-spacing="3" fill="#c69a55" opacity="0.85">→ SCROLL DOWN</text>
    </g>
  </g>

  <!-- ============================== -->
  <!--  Decorative crosshair          -->
  <!-- ============================== -->
  <g transform="translate(640 50)" stroke="#c69a55" stroke-width="0.5" opacity="0.4">
    <line x1="-15" y1="0" x2="15" y2="0"/>
    <line x1="0" y1="-15" x2="0" y2="15"/>
  </g>
</svg>
