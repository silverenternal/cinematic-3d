<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" preserveAspectRatio="xMidYMid meet" font-feature-settings="ss01 1, ss02 1">
  <defs>
    <!--  flat, no gradients  -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#02050f"/>
      <stop offset="100%" stop-color="#04081a"/>
    </linearGradient>
  </defs>

  <!-- ============================== -->
  <!--  flat background, no haze     -->
  <!-- ============================== -->
  <rect width="1280" height="480" fill="url(#bg)"/>

  <!--  one hairline horizon at lower third  -->
  <line x1="80" y1="380" x2="1200" y2="380" stroke="#1d3a7a" stroke-width="0.6" opacity="0.6"/>
  <line x1="80" y1="380" x2="240" y2="380" stroke="#6fbbff" stroke-width="0.8"/>

  <!--  a single hairline tick, off-center  -->
  <line x1="80" y1="120" x2="80" y2="130" stroke="#6fbbff" stroke-width="0.8"/>

  <!-- ============================== -->
  <!--  typography  -->
  <!-- ============================== -->

  <!--  micro label, top  -->
  <text x="80" y="100" font-family="JetBrains Mono, Menlo, monospace" font-size="11"
        letter-spacing="0.42em" fill="#6fbbff" opacity="0.85">/ RUST  ·  WEBGL  ·  CREATIVE  CODE</text>

  <!--  headline, single word  -->
  <text x="80" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="160"
        font-weight="300" letter-spacing="-6" fill="#eef2f9">Hugo Lee</text>

  <!--  thin divider, exact width = 32px  -->
  <line x1="80" y1="298" x2="112" y2="298" stroke="#6fbbff" stroke-width="1.2"/>

  <!--  subtitle  -->
  <text x="128" y="302" font-family="JetBrains Mono, Menlo, monospace" font-size="13"
        letter-spacing="0.24em" fill="#aac1e0" opacity="0.85">author of the tokitai crate family</text>

  <!--  micro label, bottom-left  -->
  <text x="80" y="406" font-family="JetBrains Mono, Menlo, monospace" font-size="10"
        letter-spacing="0.36em" fill="#6e7e9a" opacity="0.8">EST. 2024  ·  AVAILABLE</text>

  <!--  micro label, bottom-right (counterweight)  -->
  <text x="1200" y="406" font-family="JetBrains Mono, Menlo, monospace" font-size="10"
        letter-spacing="0.36em" fill="#6e7e9a" opacity="0.8" text-anchor="end">v 0.5.1  ·  crates.io</text>
</svg>
