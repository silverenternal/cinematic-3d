<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#02050f"/>
      <stop offset="100%" stop-color="#050a1c"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- ============================== -->
  <!--  window chrome  -->
  <!-- ============================== -->
  <rect x="40" y="40" width="1200" height="320" rx="6"
        fill="#04081a" stroke="#1d3a7a" stroke-width="0.8" opacity="0.95"/>

  <!-- traffic lights -->
  <g transform="translate(64 64)">
    <circle cx="0"  cy="0" r="5" fill="#3a3a3a" stroke="#5a5a5a" stroke-width="0.5"/>
    <circle cx="18" cy="0" r="5" fill="#3a3a3a" stroke="#5a5a5a" stroke-width="0.5"/>
    <circle cx="36" cy="0" r="5" fill="#3a3a3a" stroke="#5a5a5a" stroke-width="0.5"/>
  </g>

  <!-- tab title -->
  <text x="640" y="68" font-family="JetBrains Mono, Menlo, monospace" font-size="11"
        letter-spacing="0.18em" fill="#6e7e9a" text-anchor="middle">~/portfolio — zsh — 128×40</text>

  <!-- separator under title bar -->
  <line x1="40" y1="88" x2="1240" y2="88" stroke="#1d3a7a" stroke-width="0.6" opacity="0.6"/>

  <!-- ============================== -->
  <!--  terminal content  -->
  <!-- ============================== -->
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="14">

    <!-- row 1: prompt + command -->
    <text x="64" y="124" fill="#6e7e9a">silverenternal@cinematic-3d</text>
    <text x="306" y="124" fill="#6e7e9a">:</text>
    <text x="316" y="124" fill="#6fbbff">~/portfolio</text>
    <text x="424" y="124" fill="#6e7e9a">$</text>
    <text x="448" y="124" fill="#eef2f9"> whoami --verbose</text>

    <!-- output: name + tagline -->
    <text x="64" y="150" fill="#aac1e0">Hugo Lee</text>
    <text x="160" y="150" fill="#6e7e9a">·</text>
    <text x="172" y="150" fill="#aac1e0">author of the tokitai crate family</text>
    <text x="566" y="150" fill="#6e7e9a">·</text>
    <text x="578" y="150" fill="#aac1e0">rust / webgl / creative code</text>

    <text x="64" y="170" fill="#6e7e9a">since 2024 · open to interesting work</text>

    <!-- row 2: prompt + ls -->
    <text x="64" y="208" fill="#6fbbff">$</text>
    <text x="86" y="208" fill="#eef2f9"> cargo search tokitai</text>

    <!-- output: 3 crates -->
    <g transform="translate(86 234)" font-size="13">
      <text x="0"   y="0" fill="#6fbbff">tokitai</text>
      <text x="110" y="0" fill="#6e7e9a">────────</text>
      <text x="210" y="0" fill="#aac1e0">v0.5.1</text>
      <text x="290" y="0" fill="#6e7e9a">(facade, runtime composition)</text>
    </g>
    <g transform="translate(86 254)" font-size="13">
      <text x="0"   y="0" fill="#6fbbff">tokitai-core</text>
      <text x="158" y="0" fill="#6e7e9a">──</text>
      <text x="210" y="0" fill="#aac1e0">v0.5.1</text>
      <text x="290" y="0" fill="#6e7e9a">(primitives, task model)</text>
    </g>
    <g transform="translate(86 274)" font-size="13">
      <text x="0"   y="0" fill="#6fbbff">tokitai-macros</text>
      <text x="174" y="0" fill="#6e7e9a">─</text>
      <text x="210" y="0" fill="#aac1e0">v0.5.1</text>
      <text x="290" y="0" fill="#6e7e9a">(proc-macros, declarative DSL)</text>
    </g>

    <!-- row 3: open  -->
    <text x="64" y="316" fill="#6fbbff">$</text>
    <text x="86" y="316" fill="#eef2f9"> open</text>
    <text x="138" y="316" fill="#aac1e0">https://silverenternal.github.io/cinematic-3d/</text>
    <text x="640" y="316" fill="#6fbbff">▸</text>

    <!-- row 4: lab -->
    <text x="64" y="340" fill="#6fbbff">$</text>
    <text x="86" y="340" fill="#eef2f9"> open</text>
    <text x="138" y="340" fill="#aac1e0">https://silverenternal.github.io/cinematic-3d/lab.html</text>
    <text x="640" y="340" fill="#6fbbff">▸</text>
  </g>

  <!-- bottom status line -->
  <text x="64" y="376" font-family="JetBrains Mono, Menlo, monospace" font-size="10"
        letter-spacing="0.2em" fill="#6e7e9a">NORMAL  ·  UTF-8  ·  100%  ·  ↓</text>
  <text x="1216" y="376" font-family="JetBrains Mono, Menlo, monospace" font-size="10"
        letter-spacing="0.2em" fill="#6e7e9a" text-anchor="end">zsh · 0.5s</text>
</svg>
