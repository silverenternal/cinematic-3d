<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a0d12"/>
      <stop offset="50%" stop-color="#11161f"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </linearGradient>

    <radialGradient id="glow-a" cx="0.85" cy="0.4" r="0.5">
      <stop offset="0%"  stop-color="#c69a55" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#c69a55" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c69a55" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-b" cx="0.05" cy="0.95" r="0.45">
      <stop offset="0%"  stop-color="#5b8aa8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5b8aa8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="planet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#f5e8c3"/>
      <stop offset="55%" stop-color="#c69a55"/>
      <stop offset="100%" stop-color="#3a2812"/>
    </radialGradient>

    <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c69a55" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#e8d6a3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c69a55" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f5e8c3"/>
      <stop offset="100%" stop-color="#c69a55"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glow-a)"/>
  <rect width="1280" height="360" fill="url(#glow-b)"/>

  <g stroke="#e8d6a3" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="90"  x2="1280" y2="90"/>
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="270" x2="1280" y2="270"/>
    <line x1="320"  y1="0" x2="320"  y2="360"/>
    <line x1="640"  y1="0" x2="640"  y2="360"/>
    <line x1="960"  y1="0" x2="960"  y2="360"/>
  </g>

  <g transform="translate(1060 180)">
    <circle r="160" fill="none" stroke="#c69a55" stroke-width="0.4" opacity="0.18" stroke-dasharray="1 6"/>
    <circle r="120" fill="none" stroke="#c69a55" stroke-width="0.7" opacity="0.4"  stroke-dasharray="3 5"/>
    <circle r="84"  fill="none" stroke="#c69a55" stroke-width="0.9" opacity="0.55"/>
    <ellipse rx="150" ry="48" fill="none" stroke="url(#ring-grad)" stroke-width="1.2" opacity="0.7" transform="rotate(20)"/>
    <ellipse rx="170" ry="56" fill="none" stroke="#c69a55" stroke-width="0.5" opacity="0.25" transform="rotate(-15)"/>
    <circle r="54" fill="url(#planet)"/>
    <circle r="54" fill="none" stroke="#0a0d12" stroke-width="1" opacity="0.6"/>
    <circle r="64" fill="none" stroke="#e8d6a3" stroke-width="0.5" opacity="0.3"/>
    <circle cx="0"   cy="-120" r="4" fill="#e8d6a3"/>
    <circle cx="150" cy="0"    r="3" fill="#c69a55"/>
    <circle cx="-84" cy="0"    r="2.5" fill="#e8d6a3" opacity="0.8"/>
    <g stroke="#c69a55" stroke-width="1" opacity="0.6">
      <line x1="-190" y1="-140" x2="-170" y2="-140"/>
      <line x1="-190" y1="-140" x2="-190" y2="-120"/>
      <line x1="190"  y1="140"  x2="170"  y2="140"/>
      <line x1="190"  y1="140"  x2="190"  y2="120"/>
    </g>
  </g>

  <g transform="translate(70 0)">
    <line x1="0" y1="56" x2="40" y2="56" stroke="url(#ring-grad)" stroke-width="1.2"/>
    <text x="52" y="60" font-family="JetBrains Mono, Menlo, monospace" font-size="11"
          letter-spacing="6" fill="#c69a55">RUST · WEBGL · CREATIVE CODE</text>

    <text x="0" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="88"
          font-weight="300" letter-spacing="-3" fill="url(#text-grad)">Hugo Lee</text>

    <line x1="0" y1="200" x2="220" y2="200" stroke="url(#ring-grad)" stroke-width="1.4"/>
    <line x1="220" y1="200" x2="270" y2="200" stroke="#c69a55" stroke-width="1.4" opacity="0.4"/>

    <text x="0" y="238" font-family="Georgia, serif" font-size="20" font-style="italic"
          font-weight="300" fill="#e8d6a3" opacity="0.85">author of the tokitai crate family</text>

    <g transform="translate(0 278)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="11"
            letter-spacing="3" fill="#e8d6a3" opacity="0.6">CINEMATIC WEB · THREE.JS · SHADERS · TOKIO-STYLE RUST</text>
    </g>

    <g transform="translate(0 320)">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#c69a55" stroke-width="1" opacity="0.7"/>
      <text x="50" y="4" font-family="JetBrains Mono, monospace" font-size="10"
            letter-spacing="3" fill="#c69a55" opacity="0.85">→ SCROLL DOWN</text>
    </g>
  </g>

  <g transform="translate(640 50)" stroke="#c69a55" stroke-width="0.5" opacity="0.4">
    <line x1="-15" y1="0" x2="15" y2="0"/>
    <line x1="0" y1="-15" x2="0" y2="15"/>
  </g>
</svg>
