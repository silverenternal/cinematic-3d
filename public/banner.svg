<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#02050f"/>
      <stop offset="50%"  stop-color="#070d1f"/>
      <stop offset="100%" stop-color="#02050f"/>
    </linearGradient>

    <radialGradient id="nebulaA" cx="0.78" cy="0.4" r="0.5">
      <stop offset="0%"   stop-color="#3b6cc4" stop-opacity="0.55"/>
      <stop offset="40%"  stop-color="#1d3a7a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a1530" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="nebulaB" cx="0.12" cy="0.85" r="0.42">
      <stop offset="0%"   stop-color="#5b3a8c" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#5b3a8c" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="nebulaC" cx="1.05" cy="0.95" r="0.4">
      <stop offset="0%"   stop-color="#2a8aa8" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#2a8aa8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="nebulaD" cx="0.5" cy="0.0" r="0.5">
      <stop offset="0%"   stop-color="#1d3a7a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1d3a7a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="body" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#f0f4fb"/>
      <stop offset="35%"  stop-color="#aac1e0" stop-opacity="0.85"/>
      <stop offset="70%"  stop-color="#5b7fb3" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1d3a7a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="bodyGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#6fbbff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6fbbff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f0f4fb"/>
      <stop offset="100%" stop-color="#aac1e0"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6fbbff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#6fbbff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6fbbff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#nebulaD)"/>
  <rect width="1280" height="400" fill="url(#nebulaA)"/>
  <rect width="1280" height="400" fill="url(#nebulaB)"/>
  <rect width="1280" height="400" fill="url(#nebulaC)"/>

  <!-- ============================== -->
  <!--  star field (60+ quiet stars)  -->
  <!-- ============================== -->
  <g fill="#c8d4e6">
    <circle cx="60"   cy="50"  r="0.8"/>
    <circle cx="120"  cy="180" r="0.7"/>
    <circle cx="180"  cy="320" r="0.6"/>
    <circle cx="220"  cy="80"  r="0.8"/>
    <circle cx="270"  cy="240" r="0.5"/>
    <circle cx="320"  cy="120" r="0.7"/>
    <circle cx="360"  cy="280" r="0.5"/>
    <circle cx="410"  cy="60"  r="0.8"/>
    <circle cx="460"  cy="320" r="0.6"/>
    <circle cx="510"  cy="180" r="0.7"/>
    <circle cx="560"  cy="40"  r="0.9"/>
    <circle cx="600"  cy="260" r="0.5"/>
    <circle cx="650"  cy="100" r="0.7"/>
    <circle cx="700"  cy="220" r="0.6"/>
    <circle cx="750"  cy="340" r="0.5"/>
    <circle cx="800"  cy="60"  r="0.8"/>
    <circle cx="850"  cy="160" r="0.7"/>
    <circle cx="900"  cy="280" r="0.5"/>
    <circle cx="950"  cy="100" r="0.8"/>
    <circle cx="1000" cy="220" r="0.6"/>
    <circle cx="1050" cy="60"  r="0.7"/>
    <circle cx="1100" cy="320" r="0.5"/>
    <circle cx="1150" cy="180" r="0.8"/>
    <circle cx="1200" cy="40"  r="0.7"/>
    <circle cx="1250" cy="260" r="0.5"/>
  </g>
  <g fill="#7a8ba8">
    <circle cx="40"   cy="280" r="0.4"/>
    <circle cx="80"   cy="120" r="0.3"/>
    <circle cx="140"  cy="60"  r="0.4"/>
    <circle cx="200"  cy="200" r="0.3"/>
    <circle cx="260"  cy="40"  r="0.4"/>
    <circle cx="310"  cy="180" r="0.3"/>
    <circle cx="380"  cy="240" r="0.4"/>
    <circle cx="430"  cy="100" r="0.3"/>
    <circle cx="490"  cy="280" r="0.4"/>
    <circle cx="540"  cy="140" r="0.3"/>
    <circle cx="610"  cy="220" r="0.4"/>
    <circle cx="670"  cy="40"  r="0.3"/>
    <circle cx="720"  cy="180" r="0.4"/>
    <circle cx="780"  cy="100" r="0.3"/>
    <circle cx="840"  cy="240" r="0.4"/>
    <circle cx="890"  cy="40"  r="0.3"/>
    <circle cx="950"  cy="200" r="0.4"/>
    <circle cx="1010" cy="140" r="0.3"/>
    <circle cx="1080" cy="60"  r="0.4"/>
    <circle cx="1130" cy="280" r="0.3"/>
    <circle cx="1180" cy="140" r="0.4"/>
    <circle cx="1230" cy="200" r="0.3"/>
  </g>

  <!-- ============================== -->
  <!--  a single quiet glowing body   -->
  <!-- ============================== -->
  <circle cx="1080" cy="200" r="180" fill="url(#bodyGlow)"/>
  <circle cx="1080" cy="200" r="90"  fill="url(#body)"/>

  <!--  one subtle horizon line  -->
  <line x1="0" y1="320" x2="1280" y2="320" stroke="url(#lineGrad)" stroke-width="0.4"/>

  <!-- ============================== -->
  <!--  typography  -->
  <!-- ============================== -->
  <g>
    <text x="80" y="100" font-family="JetBrains Mono, Menlo, monospace" font-size="11"
          letter-spacing="0.42em" fill="#6fbbff" opacity="0.85">RUST  ·  WEBGL  ·  CREATIVE  CODE</text>

    <text x="80" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="108"
          font-weight="300" letter-spacing="-4" fill="url(#textGrad)">Hugo Lee</text>

    <line x1="80" y1="248" x2="240" y2="248" stroke="url(#lineGrad)" stroke-width="1.2"/>
    <circle cx="252" cy="248" r="2.5" fill="#6fbbff" opacity="0.9"/>

    <text x="268" y="253" font-family="JetBrains Mono, Menlo, monospace" font-size="13"
          letter-spacing="0.18em" fill="#aac1e0" opacity="0.85">author of the tokitai crate family</text>
  </g>
</svg>
