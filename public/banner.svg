<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!--  bg: nearly-black, with one quiet horizontal lift in the middle  -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#02050f"/>
      <stop offset="50%"  stop-color="#070d1f"/>
      <stop offset="100%" stop-color="#02050f"/>
    </linearGradient>

    <!--  cold-blue haze, very subtle  -->
    <radialGradient id="haze" cx="0.72" cy="0.5" r="0.6">
      <stop offset="0%"   stop-color="#1d3a7a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1d3a7a" stop-opacity="0"/>
    </radialGradient>

    <!--  single distant body, soft glow, not a black hole  -->
    <radialGradient id="body" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#c8d8ee" stop-opacity="0.95"/>
      <stop offset="35%"  stop-color="#5b7fb3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1d3a7a" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f0f4fb"/>
      <stop offset="100%" stop-color="#aac1e0"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6fbbff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#6fbbff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6fbbff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#haze)"/>

  <!--  30 quiet stars (not 60, less is more)  -->
  <g fill="#c8d4e6">
    <circle cx="80"   cy="60"  r="0.8"/>
    <circle cx="180"  cy="280" r="0.6"/>
    <circle cx="240"  cy="40"  r="0.7"/>
    <circle cx="320"  cy="200" r="0.5"/>
    <circle cx="400"  cy="100" r="0.6"/>
    <circle cx="500"  cy="300" r="0.4"/>
    <circle cx="560"  cy="160" r="0.5"/>
    <circle cx="640"  cy="50"  r="0.7"/>
    <circle cx="720"  cy="240" r="0.5"/>
    <circle cx="800"  cy="120" r="0.6"/>
    <circle cx="860"  cy="60"  r="0.4"/>
    <circle cx="940"  cy="200" r="0.5"/>
    <circle cx="1020" cy="100" r="0.6"/>
    <circle cx="1100" cy="280" r="0.4"/>
    <circle cx="1180" cy="180" r="0.5"/>
    <circle cx="1240" cy="60"  r="0.7"/>
  </g>
  <g fill="#7a8ba8">
    <circle cx="60"   cy="180" r="0.4"/>
    <circle cx="140"  cy="100" r="0.3"/>
    <circle cx="280"  cy="240" r="0.4"/>
    <circle cx="380"  cy="60"  r="0.3"/>
    <circle cx="460"  cy="180" r="0.4"/>
    <circle cx="600"  cy="280" r="0.3"/>
    <circle cx="680"  cy="120" r="0.4"/>
    <circle cx="780"  cy="280" r="0.3"/>
    <circle cx="880"  cy="180" r="0.4"/>
    <circle cx="960"  cy="60"  r="0.3"/>
    <circle cx="1060" cy="220" r="0.4"/>
    <circle cx="1140" cy="100" r="0.3"/>
    <circle cx="1220" cy="240" r="0.4"/>
  </g>

  <!--  a single quiet body in the right half — not a black hole, no orbits  -->
  <circle cx="1060" cy="180" r="120" fill="url(#body)"/>

  <!--  one subtle horizon line across the lower third  -->
  <line x1="0" y1="290" x2="1280" y2="290" stroke="url(#lineGrad)" stroke-width="0.4"/>

  <!-- ============================== -->
  <!--  typography  -->
  <!-- ============================== -->
  <g>
    <text x="80" y="60"  font-family="JetBrains Mono, Menlo, monospace" font-size="11"
          letter-spacing="6" fill="#6fbbff" opacity="0.7">RUST · WEBGL · CREATIVE CODE</text>

    <text x="80" y="190" font-family="Georgia, 'Times New Roman', serif" font-size="120"
          font-weight="300" letter-spacing="-4" fill="url(#textGrad)">Hugo Lee</text>

    <text x="80" y="234" font-family="Georgia, serif" font-size="22" font-style="italic"
          font-weight="300" fill="#aac1e0" opacity="0.75">author of the tokitai crate family</text>
  </g>
</svg>
