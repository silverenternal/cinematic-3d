<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%"  stop-color="#060b1a"/>
      <stop offset="100%" stop-color="#02050f"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- ============================== -->
  <!--  ASCII art: stylized rocket  -->
  <!--  using monospace block chars -->
  <!-- ============================== -->
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="16" text-anchor="middle">
    <!-- nose cone -->
    <text x="400" y="100" fill="#6fbbff">▲</text>
    <text x="400" y="124" fill="#aac1e0">███</text>
    <!-- upper body -->
    <text x="400" y="148" fill="#eef2f9">█████</text>
    <text x="400" y="172" fill="#eef2f9">█ ◯ █</text>
    <text x="400" y="196" fill="#eef2f9">█████</text>
    <text x="400" y="220" fill="#eef2f9">█ █ █</text>
    <text x="400" y="244" fill="#eef2f9">█ █ █</text>
    <text x="400" y="268" fill="#eef2f9">█████</text>
    <!-- fins -->
    <text x="400" y="296" fill="#aac1e0">██ ██</text>
    <text x="400" y="320" fill="#aac1e0">█  █</text>
    <!-- exhaust -->
    <text x="400" y="346" fill="#6fbbff">▼ ▼ ▼</text>
    <text x="400" y="368" fill="#1d3a7a">  ░  </text>
    <text x="400" y="392" fill="#1d3a7a">  ▒  </text>
    <text x="400" y="416" fill="#1d3a7a">  ▓  </text>
  </g>

  <!-- surrounding stars -->
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#6e7e9a">
    <text x="120" y="80">*</text>
    <text x="200" y="160">+</text>
    <text x="80"  y="240">.</text>
    <text x="680" y="120">*</text>
    <text x="600" y="220">+</text>
    <text x="720" y="280">.</text>
    <text x="160" y="320">*</text>
    <text x="640" y="360">+</text>
    <text x="100" y="400">.</text>
    <text x="700" y="80">.</text>
    <text x="280" y="60">+</text>
    <text x="520" y="60">*</text>
  </g>

  <!-- launch pad / orbit ring (box drawing) -->
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#1d3a7a">
    <text x="40" y="500">╔════════════════════════════════════════════════════════════════════════════╗</text>
    <text x="40" y="516">║</text><text x="760" y="516">║</text>
    <text x="40" y="532">║    ┌──────────────────────────────────────────────────────────────┐     ║</text>
    <text x="40" y="548">║    │   ◯  ╱╲  ◯  ╱╲  ◯  ╱╲  ◯  ╱╲  ◯  ╱╲  ◯  ╱╲  ◯  ╱╲  ◯  ╱╲  ◯ │     ║</text>
    <text x="40" y="564">║    │  ◯  ╲╱  ◯  ╲╱  ◯  ╲╱  ◯  ╲╱  ◯  ╲╱  ◯  ╲╱  ◯  ╲╱  ◯  ╲╱  ◯ │     ║</text>
    <text x="40" y="580">║    └──────────────────────────────────────────────────────────────┘     ║</text>
    <text x="40" y="596">║</text><text x="760" y="596">║</text>
    <text x="40" y="612">╚════════════════════════════════════════════════════════════════════════════╝</text>
  </g>

  <!-- caption -->
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#6e7e9a" text-anchor="middle">
    <text x="400" y="640">$ ./launch --destination silverenternal.github.io/cinematic-3d</text>
    <text x="400" y="660">→ status: in orbit · since 2024</text>
  </g>
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#6fbbff" text-anchor="middle" letter-spacing="0.4em">
    <text x="400" y="700">·  L  A  U  N  C  H  E  D  ·</text>
  </g>
</svg>
