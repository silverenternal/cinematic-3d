<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#02050f"/>
      <stop offset="100%" stop-color="#04081a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- ============================== -->
  <!--  complex box-drawing ornament -->
  <!-- ============================== -->
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="13" fill="#1d3a7a">
    <!-- top: nested double border -->
    <text x="40" y="40">╔════════════════════════════════════════════════════════════════════════════════════╗</text>
    <text x="40" y="56">║  ┌────────────────────────────────────────────────────────────────────────────────┐  ║</text>
    <text x="40" y="72">║  │</text><text x="760" y="72">│  ║</text>
    <text x="40" y="88">║  │  ╔══════════════════════════════════════════════════════════════════════╗    │  ║</text>
    <text x="40" y="104">║  │  ║</text><text x="760" y="104">║    │  ║</text>
  </g>

  <!-- center: ASCII "HUGO LEE" in block style, smaller -->
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#eef2f9">
    <text x="180" y="160">█  █ █  █  █  █ █   █ █   █ █  █ █  █</text>
    <text x="180" y="176">█  █ █  █  █  █ █   █ █   █ █  █ █  █</text>
    <text x="180" y="192">█  █ █  █  █▌ █ ▌  █ ▌  █ ▌  █ █  █</text>
    <text x="180" y="208">█████ █▌█  █▌█ █▌  █▌  █▌  █ █▌█</text>
    <text x="180" y="224">█  █ █▌█  █▌█ █▌  █▌  █▌  █ █▌█</text>
    <text x="180" y="240">█  █ █ ▌  █ ▌█ █  █ █  █ █  █ █ ▌</text>
    <text x="180" y="256">█  █ █ ▌  █ ▌█ █  █ █  █ █  █ █ ▌</text>
    <text x="180" y="272">█  █ █  ▌ █  █ █   █ █   █ █  █ █  ▌</text>
  </g>

  <!-- mid: connecting band with circuit pattern -->
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#6fbbff">
    <text x="40" y="320">╠════╣  ━━━━━━━━  ╠════════════════════════════════════════════════════════════════╣  ━━━━━━━━  ╠════╣</text>
  </g>

  <!-- decorative diamond -->
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#6fbbff" text-anchor="middle">
    <text x="400" y="354">◆</text>
    <text x="400" y="374">◇</text>
    <text x="400" y="394">◆</text>
  </g>

  <!-- ASCII stat bar with block characters -->
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="11">
    <text x="120" y="430" fill="#6e7e9a">REPOS</text>
    <text x="200" y="430" fill="#6fbbff">▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓</text>
    <text x="640" y="430" fill="#eef2f9">26</text>

    <text x="120" y="450" fill="#6e7e9a">COMMITS</text>
    <text x="200" y="450" fill="#6fbbff">▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓</text>
    <text x="640" y="450" fill="#eef2f9">193</text>

    <text x="120" y="470" fill="#6e7e9a">CRATES</text>
    <text x="200" y="470" fill="#6fbbff">▓▓▓░░░░░░░░░░░░░░░░░░░░░░░</text>
    <text x="640" y="470" fill="#eef2f9">3</text>

    <text x="120" y="490" fill="#6e7e9a">YEARS</text>
    <text x="200" y="490" fill="#6fbbff">▓▓▓▓░░░░░░░░░░░░░░░░░░░░░░</text>
    <text x="640" y="490" fill="#eef2f9">2</text>
  </g>

  <!-- bottom: closing nested border -->
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="13" fill="#1d3a7a">
    <text x="40" y="528">║  │  ╚══════════════════════════════════════════════════════════════════════╝    │  ║</text>
    <text x="40" y="544">║  │</text><text x="760" y="544">│  ║</text>
    <text x="40" y="560">║  └────────────────────────────────────────────────────────────────────────────────┘  ║</text>
    <text x="40" y="576">╚════════════════════════════════════════════════════════════════════════════════════╝</text>
  </g>
</svg>
