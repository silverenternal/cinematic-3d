<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0d12"/>
      <stop offset="50%" stop-color="#11151c"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.5" r="0.4">
      <stop offset="0%" stop-color="#c69a55" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#c69a55" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c69a55" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e8d6a3"/>
      <stop offset="60%" stop-color="#c69a55"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c69a55" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c69a55" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c69a55" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#e8d6a3" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="80"  x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320"  y1="0" x2="320"  y2="320"/>
    <line x1="640"  y1="0" x2="640"  y2="320"/>
    <line x1="960"  y1="0" x2="960"  y2="320"/>
  </g>

  <!-- right-side orbital geometry -->
  <g transform="translate(1050 160)">
    <circle r="60" fill="none" stroke="#c69a55" stroke-width="1" opacity="0.5"/>
    <circle r="90" fill="none" stroke="#c69a55" stroke-width="0.6" opacity="0.3" stroke-dasharray="2 4"/>
    <circle r="130" fill="none" stroke="#c69a55" stroke-width="0.4" opacity="0.18"/>
    <ellipse rx="160" ry="40" fill="none" stroke="#c69a55" stroke-width="0.6" opacity="0.25" transform="rotate(20)"/>
    <circle r="40" fill="url(#moon)"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#0a0d12" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- left text block -->
  <g transform="translate(80 0)">
    <text x="0" y="40" font-family="JetBrains Mono, Menlo, monospace" font-size="11"
          letter-spacing="6" fill="#c69a55">CHINA JILIANG UNIVERSITY · HANGZHOU</text>

    <text x="0" y="150" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="300"
          letter-spacing="-2" fill="#e8d6a3">Hugo Lee</text>

    <line x1="0" y1="180" x2="180" y2="180" stroke="url(#ring)" stroke-width="1.5"/>

    <text x="0" y="215" font-family="Georgia, serif" font-size="20" font-style="italic"
          font-weight="300" fill="#e8d6a3" opacity="0.8">building cinematic web experiences with code</text>

    <g transform="translate(0 250)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="11"
            letter-spacing="3" fill="#e8d6a3" opacity="0.6">AI · WEBGL · THREE.JS · CREATIVE CODING</text>
    </g>
  </g>

  <!-- bottom arrow -->
  <g transform="translate(640 290)" stroke="#c69a55" stroke-width="1" fill="none" opacity="0.7">
    <line x1="-30" y1="0" x2="0" y2="8"/>
    <line x1="0" y1="8" x2="30" y2="0"/>
  </g>
</svg>
